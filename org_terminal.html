<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');
  :root{--bg:#080808;--bg2:#0e0e0e;--bg3:#141414;--bg4:#1a1a1a;--gold:#c9742e;--gold2:#e08c3e;--gold-dim:#6b3a18;--text:#e8e0d0;--text-dim:#7a7060;--text-mid:#a89878;--border:#2a2010;--border2:#3a2c18;--red:#8b2020;--red-lt:#c47070;--green:#1a4a2a;--green-lt:#5a9a6a;--purple:#3a1a5a;--purple-lt:#9a70ca;--r:2px}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:13px}
  .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(201,116,46,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,116,46,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  .corner{position:fixed;width:90px;height:90px;opacity:.1;pointer-events:none;z-index:0}
  .corner.tl{top:0;left:0;border-top:1px solid var(--gold);border-left:1px solid var(--gold)}
  .corner.tr{top:0;right:0;border-top:1px solid var(--gold);border-right:1px solid var(--gold)}
  .corner.bl{bottom:0;left:0;border-bottom:1px solid var(--gold);border-left:1px solid var(--gold)}
  .corner.br{bottom:0;right:0;border-bottom:1px solid var(--gold);border-right:1px solid var(--gold)}
  .cls-tag{position:fixed;top:1rem;right:1rem;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.3em;color:var(--red-lt);border:1px solid var(--red);padding:.3rem .6rem;opacity:.55;z-index:50}
  #ls{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;position:relative;z-index:1}
  .lb{width:100%;max-width:380px;text-align:center}
  .logo-img{width:64px;height:auto;filter:drop-shadow(0 0 10px rgba(201,116,46,.4));margin-bottom:.5rem}
  .logo-l{width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:.9rem auto}
  .logo-n{font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:.4em;color:var(--text-dim);text-transform:uppercase;margin-bottom:2.5rem}
  .lbl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.3em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:.4rem;text-align:left}
  .inp{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'Space Mono',monospace;font-size:13px;padding:.7rem .9rem;margin-bottom:1.1rem;outline:none;border-radius:var(--r);letter-spacing:.05em}
  .inp:focus{border-color:var(--gold)}
  .btn-login{width:100%;background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.3em;text-transform:uppercase;padding:.8rem;cursor:pointer;border-radius:var(--r)}
  .btn-login:hover{background:var(--gold);color:var(--bg)}
  .err{color:var(--red-lt);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.15em;text-align:center;margin-top:1rem;opacity:0;transition:opacity .3s}
  .err.show{opacity:1}
  #dash{display:none;min-height:100vh;position:relative;z-index:1}
  .topbar{background:var(--bg2);border-bottom:1px solid var(--border2);padding:0 1.5rem;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
  .tlogo{display:flex;align-items:center;gap:.6rem}
  .tlogo img{height:24px;width:auto}
  .tlogo-txt{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.2em;color:var(--text-dim)}
  .atag{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.15em;color:var(--gold);background:rgba(201,116,46,.08);border:1px solid var(--gold-dim);padding:.3rem .6rem;border-radius:var(--r)}
  .tright{display:flex;align-items:center;gap:1rem}
  .btn-out{background:none;border:none;color:var(--text-dim);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.15em;cursor:pointer;text-transform:uppercase}
  .btn-out:hover{color:var(--red-lt)}
  .dbody{padding:1.75rem;max-width:1080px;margin:0 auto}
  .dhead{margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
  .deyebrow{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.35em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:.5rem}
  .dtitle{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--text)}
  .dtitle span{color:var(--gold)}
  .agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:.9rem;margin-top:1.4rem}
  .acard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem;cursor:pointer;position:relative;overflow:hidden}
  .acard:hover{border-color:var(--gold-dim);background:var(--bg4)}
  .acard.locked{cursor:default}
  .acard.locked:hover{border-color:var(--border);background:var(--bg3)}
  .av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:15px;margin-bottom:.7rem;border:1px solid;flex-shrink:0}
  .aname{font-size:13px;color:var(--text);font-weight:500;margin-bottom:.2rem}
  .arole{font-family:'Space Mono',monospace;font-size:7.5px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.6rem;min-height:18px}
  .abadges{display:flex;flex-wrap:wrap;gap:.3rem}
  .abadge{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.08em;padding:.15rem .4rem;border:1px solid var(--border2);border-radius:var(--r);color:var(--text-dim)}
  .locked-ov{position:absolute;inset:0;background:rgba(8,8,8,.78);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.15em;color:var(--text-dim)}
  #fv{display:none}
  .fbk{display:flex;align-items:center;gap:.5rem;background:none;border:none;color:var(--text-dim);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;margin-bottom:1.2rem;padding:0}
  .fbk:hover{color:var(--gold)}
  .fhero{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:1.5rem;margin-bottom:1.1rem;display:flex;align-items:flex-start;gap:1.25rem;flex-wrap:wrap}
  .fav{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;flex-shrink:0;border:1px solid}
  .fhinfo{flex:1;min-width:200px}
  .fname{font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:400;color:var(--text);margin-bottom:.25rem;line-height:1.2}
  .fsub{font-size:11.5px;color:var(--text-mid);margin-bottom:.65rem;line-height:1.4}
  .fbadges{display:flex;flex-wrap:wrap;gap:.3rem}
  .fb{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .5rem;border:1px solid;border-radius:var(--r);white-space:nowrap}
  .fb-gold{border-color:var(--gold-dim);color:var(--gold);background:rgba(201,116,46,.06)}
  .fb-dim{border-color:var(--border2);color:var(--text-dim);background:var(--bg4)}
  .fb-green{border-color:#2a5a3a;color:var(--green-lt);background:rgba(26,74,42,.3)}
  .fb-red{border-color:#5a2020;color:var(--red-lt);background:rgba(139,32,32,.2)}
  .fb-amber{border-color:#5a4010;color:#d4a030;background:rgba(90,64,16,.3)}
  .chat-wrap{background:#0a0e0a;border:1px solid #1e2a1e;border-radius:var(--r);margin-bottom:1.1rem;overflow:hidden}
  .chat-head{background:#101510;border-bottom:1px solid #1e2a1e;padding:.5rem .9rem;display:flex;align-items:center;gap:.5rem}
  .chat-dot{width:6px;height:6px;border-radius:50%;background:#3a9a5a;box-shadow:0 0 6px #3a9a5a;flex-shrink:0}
  .chat-head-txt{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.15em;color:#7aa88a;text-transform:uppercase}
  .chat-body{padding:.9rem}
  .chat-bubble{background:#13201a;border-radius:10px 10px 10px 2px;padding:.65rem .85rem;max-width:100%}
  .chat-sender{font-family:'Space Mono',monospace;font-size:8px;color:#5a9a6a;letter-spacing:.12em;margin-bottom:.35rem;text-transform:uppercase}
  .chat-text-native{font-size:12px;color:#d8e8dc;line-height:1.5;margin-bottom:.5rem;font-style:italic;word-wrap:break-word}
  .chat-divider{height:1px;background:#1e2a1e;margin:.45rem 0}
  .chat-text-en{font-size:10.5px;color:#8aa090;line-height:1.5;word-wrap:break-word}
  .chat-time{font-family:'Space Mono',monospace;font-size:7px;color:#456050;margin-top:.45rem;text-align:right}
  .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem}
  @media(max-width:680px){.fgrid{grid-template-columns:1fr}}
  .fcol{display:flex;flex-direction:column;gap:.9rem;min-width:0}
  .fsec{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
  .fsec-h{background:var(--bg4);border-bottom:1px solid var(--border);padding:.45rem .9rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;flex-wrap:wrap}
  .fsec-lbl{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:.25em;text-transform:uppercase}
  .fsec-b{padding:.8rem .9rem}
  .ftext{color:var(--text-mid);line-height:1.6;font-size:12px}
  .sgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:.4rem}
  .scell{background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);padding:.5rem .25rem;text-align:center}
  .sv{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--gold);line-height:1}
  .sl{font-family:'Space Mono',monospace;font-size:6.5px;color:var(--text-dim);letter-spacing:.15em;margin-top:3px}
  .rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem}
  .rcell{background:var(--bg4);border-radius:var(--r);padding:.55rem .35rem;text-align:center;border-top:2px solid}
  .rv{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:400;color:var(--text);line-height:1.15}
  .rl{font-family:'Space Mono',monospace;font-size:6.5px;color:var(--text-dim);letter-spacing:.15em;margin-top:3px}
  .rsub{font-size:7px;color:var(--text-dim);margin-top:2px;opacity:.7;line-height:1.3}
  .prow{display:flex;align-items:center;justify-content:space-between;padding:.28rem 0;border-bottom:1px solid var(--border);gap:.5rem}
  .prow:last-child{border-bottom:none}
  .pn{font-size:11.5px;color:var(--text)}
  .pb{font-family:'Space Mono',monospace;font-size:10.5px;font-weight:700;padding:.1rem .4rem;border-radius:var(--r);flex-shrink:0}
  .b5{color:#5a9a6a;background:rgba(26,74,42,.4)}
  .b10{color:var(--gold);background:rgba(201,116,46,.1)}
  .b15{color:#c47070;background:rgba(139,32,32,.2)}
  .hitem{border-left:2px solid var(--gold-dim);padding:.4rem .65rem;margin-bottom:.5rem;background:var(--bg4);border-radius:0 var(--r) var(--r) 0}
  .hitem:last-child{margin-bottom:0}
  .hn{font-size:10.5px;font-weight:600;color:var(--gold);margin-bottom:.2rem}
  .hd{font-size:10.5px;color:var(--text-dim);line-height:1.45}
  .eitem{border-left:2px solid var(--border2);padding:.4rem .65rem;margin-bottom:.5rem;background:var(--bg4);border-radius:0 var(--r) var(--r) 0}
  .eitem:last-child{margin-bottom:0}
  .en{font-size:10.5px;font-weight:600;color:var(--text-mid);margin-bottom:.2rem}
  .ed{font-size:10.5px;color:var(--text-dim);line-height:1.45}
  .sbox{background:rgba(58,26,90,.2);border:1px solid rgba(58,26,90,.5);border-radius:var(--r);padding:.65rem;font-size:11.5px;color:var(--purple-lt);line-height:1.55}
  .ph{font-family:'Space Mono',monospace;font-size:9.5px;color:var(--gold2);letter-spacing:.1em;margin-bottom:.45rem;font-weight:700}
  .preq{font-size:10.5px;color:var(--text-dim);padding:.4rem .65rem;background:var(--bg4);border-radius:var(--r);margin-bottom:.6rem;line-height:1.5;border-left:2px solid var(--purple-lt)}
  .pniv{margin-bottom:.5rem;padding:.4rem .65rem;background:var(--bg4);border-radius:var(--r)}
  .pniv:last-child{margin-bottom:0}
  .pnn{font-size:10.5px;font-weight:600;margin-bottom:.2rem}
  .pnd{font-size:10.5px;color:var(--text-dim);line-height:1.45}
  .def-note{font-size:9.5px;color:var(--text-dim);margin-top:.5rem;font-style:italic;line-height:1.4}
  .gp-tag{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.1em;padding:.15rem .4rem;border-radius:var(--r);background:rgba(201,116,46,.15);color:var(--gold2)}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

<div id="ls">

</div>

<div id="dash">

      <img src="data:image/png;base64,LOGOPLACEHOLDER">
      <span class="tlogo-txt">TERMINAL DE CAMPO</span>

    <div class="tright">
      <div class="atag" id="atag">AGENTE: —</div>
      <button class="btn-out" onclick="doLogout()">[ sair ]</button>
    </div>

  <div class="dbody">
    <div id="as">
      <div class="dhead">

      <div class="agrid" id="agrid"></div>
    </div>
    <div id="fv">
      <button class="fbk" onclick="backToDash()">← voltar à listagem</button>
      <div id="fc"></div>
    </div>
  </div>
</div>

  equip:[{n:"Arquivo Pessoal Portátil (HD encriptado)",d:"Décadas de registos digitalizados. +3 em Investigação sempre que consultado, mas requer 1 acção completa para pesquisar."},{n:"Óculos de Leitura com Lupa Integrada",d:"Permite examinar detalhes microscópicos em documentos e selos sem equipamento adicional."},{n:"Caderno de Notas Cifrado",d:"Sistema de cifra pessoal desenvolvido ao longo de 30 anos. Ilegível para qualquer pessoa que não seja Helena, mesmo com Tecnologia DT 25."},{n:"Cartão de Acesso a Bibliotecas Restritas (Europa)",d:"Abre portas em 14 arquivos académicos e religiosos europeus. Não funciona fora da Europa."},{n:"Bengala de Madeira de Carvalho",d:"Arma simples improvisada. Dano 1d4 (sem bónus de FOR — Helena não tem treino de combate nenhum)."}]});

  chatNat:"Команда повністю довіряє вашій оцінці ситуації на місці. Координуйте позиціонування агентів і втручайтесь особисто лише в крайньому випадку.",

let cur=null;
function bc(b){return b==='+5'?'b5':b==='+10'?'b10':'b15'}

function doLogin(){
  const id=document.getElementById('lid').value.trim().toLowerCase();
  const pw=document.getElementById('lpw').value.trim();
  const ag=A.find(a=>a.id===id&&a.pw===pw);
  if(ag){
    cur=ag;
    document.getElementById('ls').style.display='none';
    document.getElementById('dash').style.display='block';
    document.getElementById('atag').textContent='AGENTE: '+ag.name.split(' ')[0].toUpperCase();
    buildGrid();
  }else{
    const e=document.getElementById('lerr');
    e.classList.add('show');
    setTimeout(()=>e.classList.remove('show'),3000);
  }
}
function doLogout(){
  cur=null;
  document.getElementById('dash').style.display='none';
  document.getElementById('ls').style.display='flex';
  document.getElementById('lid').value='';
  document.getElementById('lpw').value='';
  document.getElementById('as').style.display='block';
  document.getElementById('fv').style.display='none';
}
document.getElementById('lpw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('lid').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

function buildGrid(){
  const g=document.getElementById('agrid');
  g.innerHTML='';
  A.forEach(a=>{
    const me=a.id===cur.id;
    const d=document.createElement('div');
    d.className='acard'+(me?'':' locked');
    d.innerHTML=`<div class="av" style="background:${a.ab};color:${a.at};border-color:${a.at}30">${a.initials}</div>
    <div class="aname">${a.name}</div>
    <div class="arole">${a.trilha}</div>
    <div class="abadges">
      <span class="abadge">${a.classe}</span>
      <span class="abadge ${a.difb}" style="border:none">${a.dif}</span>
    </div>
    ${!me?'<div class="locked-ov">// ACESSO RESTRITO</div>':''}`;
    if(me)d.addEventListener('click',()=>openFicha(a));
    g.appendChild(d);
  });
}

function openFicha(a){
  document.getElementById('as').style.display='none';
  const fv=document.getElementById('fv');
  fv.style.display='block';
  document.getElementById('fc').innerHTML=`
    <div class="fhero">
      <div class="fav" style="background:${a.ab};color:${a.at};border-color:${a.at}40">${a.initials}</div>
      <div class="fhinfo">
        <div class="fname">${a.name}</div>
        <div class="fsub">${a.nac} &nbsp;·&nbsp; ${a.idade} &nbsp;·&nbsp; ${a.ocup}</div>
        <div class="fbadges">
          <span class="fb fb-gold">${a.classe}</span>
          <span class="fb fb-dim">${a.trilha}</span>
          <span class="fb fb-dim">Origem: ${a.origem}</span>
          <span class="fb fb-green">NEX 50%</span>
          <span class="fb ${a.difb}">${a.dif}</span>
          <span class="fb gp-tag">${a.gp}</span>
        </div>
      </div>
    </div>

    <div class="chat-wrap">
      <div class="chat-head">
        <div class="chat-dot"></div>
        <div class="chat-head-txt">Canal Seguro — Mensagem do Comando</div>
      </div>
      <div class="chat-body">
        <div class="chat-bubble">
          <div class="chat-sender">Comando &nbsp;·&nbsp; Não Identificado</div>
          <div class="chat-text-native">${a.chatNat}</div>
          <div class="chat-divider"></div>
          <div class="chat-text-en">${a.chatEn}</div>
          <div class="chat-time">ENVIADO ANTES DO INÍCIO DA OPERAÇÃO</div>
        </div>
      </div>
    </div>

    <div class="fgrid">
      <div class="fcol">
        <div class="fsec">
          <div class="fsec-h"><div class="fsec-lbl" style="color:var(--gold)">Atributos</div></div>
          <div class="fsec-b">
            <div class="sgrid">${Object.entries(a.stats).map(([k,v])=>`<div class="scell"><div class="sv">${v}</div><div class="sl">${k}</div></div>`).join('')}</div>
          </div>
        </div>
        <div class="fsec">
          <div class="fsec-h"><div class="fsec-lbl" style="color:var(--red-lt)">Recursos</div></div>
          <div class="fsec-b">
            <div class="rgrid">
              <div class="rcell" style="border-color:var(--red)"><div class="rv">${a.pv}</div><div class="rl">PV</div></div>
              <div class="rcell" style="border-color:var(--green-lt)"><div class="rv">${a.pe}</div><div class="rl">PE máx</div></div>
              <div class="rcell" style="border-color:var(--purple-lt)"><div class="rv">${a.san}</div><div class="rl">SAN</div></div>
            </div>
            <div style="margin-top:.5rem;font-size:9.5px;color:var(--text-dim);text-align:center">Deslocamento: ${a.desl}</div>
          </div>
        </div>
        <div class="fsec">
          <div class="fsec-h"><div class="fsec-lbl" style="color:#6aabef">Defesas</div></div>
          <div class="fsec-b">
            <div class="rgrid">
              <div class="rcell" style="border-color:#2a5a8a"><div class="rv">10+arm</div><div class="rl">Passiva</div></div>
              <div class="rcell" style="border-color:#6a3a9a"><div class="rv">Reacção</div><div class="rl">Bloqueio</div></div>
              <div class="rcell" style="border-color:var(--green-lt)"><div class="rv">Reacção</div><div class="rl">Esquiva</div></div>
            </div>
            <div class="def-note">${a.defnote}</div>
          </div>
        </div>
        <div class="fsec">
          <div class="fsec-h">
            <div class="fsec-lbl" style="color:var(--text-mid)">Perícias</div>
            <div style="font-size:7px;color:var(--text-dim);font-family:monospace">+5/+10/+15</div>
          </div>
          <div class="fsec-b" style="padding:.5rem .9rem">
            ${a.pericias.map(([n,b])=>`<div class="prow"><span class="pn">${n}</span><span class="pb ${bc(b)}">${b}</span></div>`).join('')}
          </div>
        </div>
        <div class="fsec">
          <div class="fsec-h"><div class="fsec-lbl" style="color:var(--gold2)">Poder de Êxtase</div></div>
          <div class="fsec-b">
            <div style="background:rgba(58,26,90,.15);border:1px solid rgba(58,26,90,.3);border-radius:var(--r);padding:.85rem .9rem">
              <div class="ph">${a.poder.h}</div>
              <div class="preq">${a.poder.req}</div>
              ${a.poder.ns.map(n=>`<div class="pniv"><div class="pnn" style="color:${n.c}">${n.n}</div><div class="pnd">${n.d}</div></div>`).join('')}
            </div>
          </div>
        </div>
      </div>
      <div class="fcol">
        <div class="fsec">
          <div class="fsec-h"><div class="fsec-lbl" style="color:var(--text-mid)">Background</div></div>
          <div class="fsec-b"><div class="ftext">${a.bg}</div></div>
        </div>
        <div class="fsec">
          <div class="fsec-h"><div class="fsec-lbl" style="color:var(--purple-lt)">Segredo</div></div>
          <div class="fsec-b"><div class="sbox">${a.segredo}</div></div>
        </div>
        <div class="fsec">
          <div class="fsec-h"><div class="fsec-lbl" style="color:var(--green-lt)">Trilha: ${a.trilha}</div></div>
          <div class="fsec-b">
            ${a.trilha_habs.map(h=>`<div class="hitem"><div class="hn">${h.n}</div><div class="hd">${h.d}</div></div>`).join('')}
          </div>
        </div>
        <div class="fsec">
          <div class="fsec-h"><div class="fsec-lbl" style="color:var(--gold)">Equipamento</div></div>
          <div class="fsec-b">
            ${a.equip.map(e=>`<div class="eitem"><div class="en">${e.n}</div><div class="ed">${e.d}</div></div>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
}
function backToDash(){
  document.getElementById('fv').style.display='none';
  document.getElementById('as').style.display='block';
}
</script>
